<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin | Post 300</title><link rel="stylesheet" href="../css/style.css"><link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Open+Sans:wght@400;700;800&display=swap" rel="stylesheet"></head><body>
<nav class="navbar"><div class="nav-inner"><a class="nav-brand" href="../index.html"><img class="nav-logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/American_Legion_emblem.svg/120px-American_Legion_emblem.svg.png" alt=""><span>Post 300 Admin</span></a><div class="nav-links"><a href="../index.html">Site</a><a href="events.html">Events</a><a href="login.html">Member Login</a></div></div></nav>
<header class="page-hero"><h1>Admin Dashboard</h1><p>Manage Post 300 content, members, rentals, games, operations, and reports</p></header>
<main class="section"><section id="loginBox" class="form-wrap"><h2 class="section-title">Admin Login</h2><div class="form-group"><label>Password</label><input id="adminPass" type="password"></div><button class="btn-primary" onclick="login()">Login</button></section>
<section id="adminApp" style="display:none"><div class="stat-grid" id="stats"></div><div class="admin-card" style="margin-bottom:22px"><h2 class="section-title">Admin AI Assistant</h2><div id="chat" class="ai-chat"><div class="ai-bubble">Try: status report, check inventory, or create event Fish Fry on 2026-08-14.</div></div><div class="ai-row"><input id="prompt" placeholder="Type an admin command"><button class="btn-primary" onclick="askAdmin()">Send</button></div></div><div id="panels" class="admin-grid"></div></section></main>
<div id="modalWrap" class="modal-overlay"><div class="modal"><button class="modal-close" onclick="modalWrap.classList.remove('open')">×</button><h2 id="modalTitle" class="section-title"></h2><form id="recordForm"></form></div></div>
<footer class="footer"><div class="footer-inner">American Legion Post 300 Admin</div></footer><script src="../js/supabase.js"></script><script>
const defs=[
["announcement","Announcements",["title","category","body","expires_at"]],
["event","Events",["title","event_date","start_time","event_type","location","description"]],
["hall_rental_inquiry","Hall Rentals",["full_name","email","phone","requested_date","event_type","guest_count","status","message"]],
["site_member","Members",["full_name","email","phone","membership_type","membership_status","role"]],
["officer","Officers",["full_name","title","email","phone","photo_url","sort_order"]],
["gallery","Gallery",["photo_url","caption","category","sort_order"]],
["bingo_event","Bingo Events",["title","event_date","start_time","price"]],
["bingo_player","Bingo Players",["full_name","checked_in_at","notes"]],
["bingo_game","Bingo Games",["title","pattern","status"]],
["bingo_call","Bingo Calls",["game_title","ball","called_at"]],
["bingo_winner","Bingo Winners",["winner_name","game_title","prize","won_at"]],
["staff","Staff",["full_name","role","staff_type","is_active"]],
["bartender_schedule","Bartender Schedule",["full_name","shift_date","start_time","end_time","status"]],
["inventory","Inventory",["item_name","quantity","min_quantity","category"]],
["building_maintenance","Maintenance",["title","priority","status","assigned_to","description"]],
["donation","Donations",["donor_name","amount","payment_type","note"]],
["document","Documents",["title","document_url","category","description"]],
["staff_training","Staff Training",["full_name","certification","expires_at","status"]],
["home_content","Home Content",["section","title","body","image_url"]]
];let cache={};
async function login(){try{const r=await Post300.adminLogin(adminPass.value);if(!r.ok)throw new Error("Invalid password");sessionStorage.setItem("post300_admin","1");loginBox.style.display="none";adminApp.style.display="block";loadAll()}catch(e){toast(e.message,"error")}}
if(sessionStorage.getItem("post300_admin")){loginBox.style.display="none";adminApp.style.display="block";loadAll()}
async function loadAll(){await Promise.all(defs.map(async d=>cache[d[0]]=await Post300.list(d[0],200)));stats.innerHTML=`<div class="stat-card"><div class="stat-num">${cache.event.length}</div><div>Events</div></div><div class="stat-card"><div class="stat-num">${cache.site_member.length}</div><div>Members</div></div><div class="stat-card"><div class="stat-num">${cache.hall_rental_inquiry.length}</div><div>Rentals</div></div><div class="stat-card"><div class="stat-num">${cache.inventory.length}</div><div>Inventory</div></div>`;panels.innerHTML=defs.map(([type,label])=>panel(type,label)).join("")}
function panel(type,label){const rows=cache[type]||[];return `<section class="admin-card"><h3>${label}</h3><button class="btn-primary" onclick="openForm('${type}')">Add</button><div class="record-list">${rows.slice(0,6).map(r=>record(type,r)).join("")||"<p class='muted'>No records.</p>"}</div></section>`}
function record(type,r){const name=r.title||r.full_name||r.item_name||r.winner_name||r.section||r.donor_name||"Record";const sub=r.event_date||r.requested_date||r.email||r.status||r.category||"";return `<div class="record-item"><strong>${escapeHtml(name)}</strong><br><span class="muted">${escapeHtml(sub)}</span><div class="record-actions"><button class="btn-secondary" onclick='openForm("${type}",${JSON.stringify(r).replaceAll("'","&#39;")})'>Edit</button><button class="btn-danger" onclick="delRec('${type}',${r.id})">Delete</button></div></div>`}
function fieldHtml(f,row){const val=escapeHtml(row[f]??"");const label=f.replaceAll("_"," ");if(f.includes("description")||f==="body"||f==="message"||f==="note")return `<div class="form-group"><label>${label}</label><textarea name="${f}">${val}</textarea></div>`;let type=f.includes("date")||f.endsWith("_at")?"date":f.includes("amount")||f.includes("quantity")||f.includes("count")||f.includes("order")?"number":f.includes("email")?"email":f.includes("url")?"url":"text";return `<div class="form-group"><label>${label}</label><input type="${type}" name="${f}" value="${val}"></div>`}
function openForm(type,row={}){const def=defs.find(d=>d[0]===type);modalTitle.textContent=(row.id?"Edit ":"Add ")+def[1];recordForm.innerHTML=def[2].map(f=>fieldHtml(f,row)).join("")+`<button class="btn-primary">Save</button>`;recordForm.onsubmit=async e=>{e.preventDefault();const data=Object.fromEntries(new FormData(recordForm));if(row.id)data.id=row.id;row.id?await Post300.update(type,data):await Post300.create(type,data);modalWrap.classList.remove("open");toast("Record saved");loadAll()};modalWrap.classList.add("open")}
async function delRec(type,id){if(confirm("Delete this record?")){await Post300.remove(type,id);toast("Record deleted");loadAll()}}
async function askAdmin(){const q=prompt.value;chat.innerHTML+=`<div class="ai-bubble user">${escapeHtml(q)}</div>`;prompt.value="";const r=await Post300.assistant(q);chat.innerHTML+=`<div class="ai-bubble">${escapeHtml(r.reply)}</div>`;chat.scrollTop=chat.scrollHeight;loadAll()}
</script></body></html>
