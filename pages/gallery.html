<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gallery | Post 300</title><link rel="stylesheet" href="../css/style.css"><link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Open+Sans:wght@400;700;800&display=swap" rel="stylesheet"></head><body><nav class="navbar"><div class="nav-inner"><a class="nav-brand" href="../index.html"><img class="nav-logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/American_Legion_emblem.svg/120px-American_Legion_emblem.svg.png" alt=""><span>Post 300</span></a><div class="nav-links"><a href="events.html">Events</a><a href="hall-rental.html">Hall Rental</a><a href="games.html">Games</a><a href="membership.html">Join</a></div></div></nav><header class="page-hero"><h1>Photo Gallery</h1><p>Post 300 people, hall, and community</p></header><main class="section"><div id="gallery" class="gallery-grid"></div></main><div id="light" class="modal-overlay"><div class="modal"><button class="modal-close" onclick="light.classList.remove('open')">×</button><img id="lightImg" alt=""><p id="lightCap"></p></div></div><footer class="footer"><div class="footer-inner">American Legion Post 300</div></footer><script src="../js/supabase.js"></script><script>Post300.list("gallery",100).then(rows=>{if(!rows.length)rows=POST300_PHOTOS.map((p,i)=>({photo_url:p,caption:`Post 300 photo ${i+1}`}));gallery.innerHTML=rows.map((g,i)=>`<figure class="gallery-item" data-i="${i}"><img src="${escapeHtml(g.photo_url)}" alt=""><figcaption>${escapeHtml(g.caption||g.category||"Post 300")}</figcaption></figure>`).join("");gallery.querySelectorAll(".gallery-item").forEach((el,i)=>el.onclick=()=>{lightImg.src=rows[i].photo_url;lightCap.textContent=rows[i].caption||"";light.classList.add("open")})})</script></body></html>
