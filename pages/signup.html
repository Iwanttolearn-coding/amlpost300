<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Signup | Post 300</title><link rel="stylesheet" href="../css/style.css"><link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Open+Sans:wght@400;700;800&display=swap" rel="stylesheet"></head><body><nav class="navbar"><div class="nav-inner"><a class="nav-brand" href="../index.html"><img class="nav-logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/American_Legion_emblem.svg/120px-American_Legion_emblem.svg.png" alt=""><span>Post 300</span></a><div class="nav-links"><a href="membership.html">Membership</a><a href="login.html">Login</a><a class="btn-admin" href="admin.html">Admin</a></div><button class="hamburger" onclick="toggleMenu()">☰</button></div><div class="mobile-menu" id="mobileMenu"><a href="../index.html">Home</a><a href="membership.html">Membership</a><a href="login.html">Login</a></div></nav><header class="page-hero"><h1>Member Registration</h1><p>Applications are saved as pending for admin review</p></header><main class="section"><form id="signupForm" class="form-wrap"><div class="form-row"><div class="form-group"><label>Full Name</label><input name="full_name" required></div><div class="form-group"><label>Email</label><input type="email" name="email" required></div></div><div class="form-row"><div class="form-group"><label>Phone</label><input name="phone"></div><div class="form-group"><label>Membership Type</label><select name="membership_type"><option>American Legion</option><option>Auxiliary</option><option>Sons of The American Legion</option><option>Supporter</option></select></div></div><div class="form-group"><label>Password</label><input type="password" name="password" minlength="8" required></div><button class="btn-primary">Create Account</button><div id="ok" class="form-success">Registration submitted. An admin can approve your membership.</div></form></main><footer class="footer"><div class="footer-inner">American Legion Post 300</div></footer><script src="../js/supabase.js"></script><script>signupForm.onsubmit=async e=>{e.preventDefault();try{await Post300.signup(Object.fromEntries(new FormData(signupForm)));ok.style.display="block";signupForm.reset();toast("Signup submitted")}catch(err){toast(err.message,"error")}}</script></body></html>
