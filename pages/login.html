<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login | Post 300</title><link rel="stylesheet" href="../css/style.css"><link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Open+Sans:wght@400;700;800&display=swap" rel="stylesheet"></head><body><nav class="navbar"><div class="nav-inner"><a class="nav-brand" href="../index.html"><img class="nav-logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/American_Legion_emblem.svg/120px-American_Legion_emblem.svg.png" alt=""><span>Post 300</span></a><div class="nav-links"><a href="membership.html">Membership</a><a href="signup.html">Signup</a><a class="btn-admin" href="admin.html">Admin</a></div></div></nav><header class="page-hero"><h1>Member Login</h1><p>View your session dashboard</p></header><main class="section"><form id="loginForm" class="form-wrap"><div class="form-group"><label>Email</label><input type="email" name="email" required></div><div class="form-group"><label>Password</label><input type="password" name="password" required></div><button class="btn-primary">Login</button></form><div id="dash" class="member-box" style="display:none;margin-top:22px;padding:22px"></div></main><footer class="footer"><div class="footer-inner">American Legion Post 300</div></footer><script src="../js/supabase.js"></script><script>function show(m){dash.style.display="block";dash.innerHTML=`<h2>Welcome, ${escapeHtml(m.full_name)}</h2><p>Status: <strong>${escapeHtml(m.membership_status||"pending")}</strong></p><p>Role: ${escapeHtml(m.role||"member")}</p><button class="btn-secondary" onclick="localStorage.removeItem('post300_member');location.reload()">Logout</button>`}const saved=localStorage.getItem("post300_member");if(saved)show(JSON.parse(saved));loginForm.onsubmit=async e=>{e.preventDefault();try{const {member}=await Post300.login(Object.fromEntries(new FormData(loginForm)));localStorage.setItem("post300_member",JSON.stringify(member));show(member);loginForm.reset()}catch(err){toast(err.message,"error")}}</script></body></html>
