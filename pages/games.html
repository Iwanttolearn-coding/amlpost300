<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Bingo & Games | Post 300</title><link rel="stylesheet" href="../css/style.css"><link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Open+Sans:wght@400;700;800&display=swap" rel="stylesheet"><style>.bingo-card{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;max-width:430px}.bingo-card div{background:white;border:1px solid var(--line);border-radius:5px;text-align:center;padding:12px;font-weight:900}.bingo-card .marked{background:var(--red);color:white}</style></head><body><nav class="navbar"><div class="nav-inner"><a class="nav-brand" href="../index.html"><img class="nav-logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/American_Legion_emblem.svg/120px-American_Legion_emblem.svg.png" alt=""><span>Post 300</span></a><div class="nav-links"><a href="events.html">Events</a><a href="gallery.html">Gallery</a><a href="membership.html">Join</a></div></div></nav><header class="page-hero"><h1>Bingo & Games</h1><p>AI games assistant, bingo card generator, calls, and winners</p></header><main class="section"><div class="grid"><section><h2 class="section-title">Bingo Card</h2><div id="card" class="bingo-card"></div><div class="hero-btns"><button class="btn-primary" onclick="newCard()">New Card</button><button class="btn-secondary" onclick="callBall()">Call Number</button><button class="btn-secondary" onclick="checkBingo()">Check Bingo</button></div><p id="called" class="muted"></p></section><section class="admin-card"><h2 class="section-title">Games Assistant</h2><div id="chat" class="ai-chat"><div class="ai-bubble">Ask about bingo rules, upcoming bingo, recent winners, or card status.</div></div><div class="ai-row"><input id="ask" placeholder="Ask the games assistant"><button class="btn-primary" onclick="assistant()">Send</button></div></section></div><h2 class="section-title" style="margin-top:36px">Upcoming Bingo</h2><div id="bingo" class="events-grid"></div><h2 class="section-title" style="margin-top:36px">Recent Winners</h2><div id="winners" class="events-grid"></div></main><footer class="footer"><div class="footer-inner">American Legion Post 300</div></footer><script src="../js/supabase.js"></script><script>
let nums=[],calledNums=[];function col(min,max){let a=[];while(a.length<5){let n=Math.floor(Math.random()*(max-min+1))+min;if(!a.includes(n))a.push(n)}return a}function newCard(){const cols=[col(1,15),col(16,30),col(31,45),col(46,60),col(61,75)];nums=[];card.innerHTML=["B","I","N","G","O"].map(h=>`<div>${h}</div>`).join("");for(let r=0;r<5;r++)for(let c=0;c<5;c++){let n=r===2&&c===2?"FREE":cols[c][r];nums.push(n);card.innerHTML+=`<div class="${n==="FREE"?"marked":""}" data-n="${n}">${n}</div>`}}function callBall(){let n;do{n=Math.floor(Math.random()*75)+1}while(calledNums.includes(n));calledNums.push(n);called.textContent="Called: "+calledNums.join(", ");document.querySelectorAll("[data-n]").forEach(el=>{if(Number(el.dataset.n)===n)el.classList.add("marked")})}function checkBingo(){const cells=[...document.querySelectorAll("[data-n]")];let m=i=>cells[i].classList.contains("marked");let ok=false;for(let r=0;r<5;r++)ok ||= [0,1,2,3,4].every(c=>m(r*5+c));for(let c=0;c<5;c++)ok ||= [0,1,2,3,4].every(r=>m(r*5+c));ok ||= [0,6,12,18,24].every(m)||[4,8,12,16,20].every(m);toast(ok?"BINGO is showing on this card.":"No bingo yet.")}async function assistant(){const q=ask.value;chat.innerHTML+=`<div class="ai-bubble user">${escapeHtml(q)}</div>`;ask.value="";let local=q.toLowerCase().includes("remaining")?`${75-calledNums.length} numbers remain.`:null;const reply=local||((await Post300.assistant(q)).reply);chat.innerHTML+=`<div class="ai-bubble">${escapeHtml(reply)}</div>`;chat.scrollTop=chat.scrollHeight}newCard();Promise.all([Post300.list("bingo_event",20),Post300.list("bingo_winner",20)]).then(([e,w])=>{bingo.innerHTML=e.map(x=>`<article class="evt-card"><div class="evt-date">${formatDate(x.event_date)}</div><div class="evt-title">${escapeHtml(x.title)}</div><p>${escapeHtml(x.price||"")}</p></article>`).join("")||"<p>No bingo events listed.</p>";winners.innerHTML=w.map(x=>`<article class="evt-card"><div class="evt-title">${escapeHtml(x.winner_name)}</div><p>${escapeHtml(x.game_title||"")} ${escapeHtml(x.prize||"")}</p></article>`).join("")||"<p>No winners recorded yet.</p>"})</script></body></html>
