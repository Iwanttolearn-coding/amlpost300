<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Events | Post 300</title><link rel="stylesheet" href="../css/style.css"><link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Open+Sans:wght@400;700;800&display=swap" rel="stylesheet"></head><body>
<nav class="navbar"><div class="nav-inner"><a class="nav-brand" href="../index.html"><img class="nav-logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/American_Legion_emblem.svg/120px-American_Legion_emblem.svg.png" alt=""><span>Post 300</span></a><div class="nav-links"><a href="events.html">Events</a><a href="hall-rental.html">Hall Rental</a><a href="officers.html">Officers</a><a href="gallery.html">Gallery</a><a href="games.html">Games</a><a href="membership.html">Join</a><a href="login.html">Login</a><a class="btn-admin" href="admin.html">Admin</a></div><button class="hamburger" onclick="toggleMenu()">☰</button></div><div class="mobile-menu" id="mobileMenu"><a href="../index.html">Home</a><a href="hall-rental.html">Hall Rental</a><a href="officers.html">Officers</a><a href="gallery.html">Gallery</a><a href="games.html">Games</a><a href="membership.html">Join</a><a href="login.html">Login</a><a href="admin.html">Admin</a></div></nav>
<header class="page-hero"><h1>Events Calendar</h1><p>Bingo, socials, meetings, ceremonies, and community nights</p></header><main class="section"><div class="calendar-wrap"><div class="cal-header"><button class="cal-nav" id="prev">‹</button><h3 data-calendar-title="cal"></h3><button class="cal-nav" id="next">›</button></div><div class="cal-grid" id="cal"></div></div><div id="detail" class="info-box" style="display:none;margin-top:18px"></div><h2 class="section-title" style="margin-top:36px">Upcoming Events</h2><div id="list" class="events-grid"></div></main><footer class="footer"><div class="footer-inner">American Legion Post 300 | San Antonio, TX</div></footer>
<script src="../js/supabase.js"></script><script>
let current=new Date(),events=[];async function load(){events=await Post300.list("event",200);draw();list.innerHTML=events.map(e=>`<article class="evt-card"><div class="evt-date">${formatDate(e.event_date)}</div><div class="evt-title">${escapeHtml(e.title)}</div><div class="evt-type">${escapeHtml(e.event_type||"")} ${escapeHtml(e.start_time||"")}</div><p>${escapeHtml(e.description||"")}</p></article>`).join("")||"<p>No events scheduled.</p>"}function draw(){renderCalendar("cal",events,current,d=>{const day=events.filter(e=>e.event_date===d);detail.style.display="block";detail.innerHTML=day.length?`<h3>${formatDate(d)}</h3>`+day.map(e=>`<p><strong>${escapeHtml(e.title)}</strong><br>${escapeHtml(e.start_time||"")} ${escapeHtml(e.location||"")}</p>`).join(""):`<h3>${formatDate(d)}</h3><p>No events listed for this date.</p>`})}prev.onclick=()=>{current.setMonth(current.getMonth()-1);draw()};next.onclick=()=>{current.setMonth(current.getMonth()+1);draw()};load().catch(e=>toast(e.message,"error"));
</script></body></html>
